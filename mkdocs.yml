site_name: Project ATLAS
site_description: Enterprise AI Platform Architect Playbook — a documentation-first knowledge base on building and operating production AI platforms.
site_author: Cavosh Innovation

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Executive Summary: 01-Executive-Summary.md
  - Skills Matrix: 02-Skills-Matrix.md
  - Technology Radar: 03-Technology-Radar.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
